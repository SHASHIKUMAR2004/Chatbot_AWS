# SearXNG configuration for ChatBot.
# The key line is `formats: [..., json]` — JSON output is OFF by default,
# and our backend needs it. Replace the secret_key before any public use.
use_default_settings: true

server:
  secret_key: "change-me-to-a-long-random-string"
  limiter: false          # we're the only client (internal network)
  image_proxy: true

search:
  safe_search: 0
  formats:
    - html
    - json                # REQUIRED so the backend can query the JSON API

ui:
  static_use_hash: true