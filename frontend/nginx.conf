server {
    listen 80;
    client_max_body_size 100m;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # Static files (SPA-style fallback to index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (they are content-stable here)
    location ~* \.(?:css|js|woff2?|svg|png|jpg|ico)$ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # --- API proxy to the FastAPI backend ---
    # The backend service name matches docker-compose ("backend").
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ---- Critical for Server-Sent Events streaming ----
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }
}
