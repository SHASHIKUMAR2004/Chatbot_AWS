<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>ChatBot — AI Chat</title>
  <meta name="description" content="A fast, streaming AI chat assistant with document upload." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Markdown + sanitize + syntax highlight (vendored locally for offline/industrial robustness) -->
  <link rel="stylesheet" href="css/vendor/hljs-github-dark.min.css" id="hljs-theme" />
  <script src="js/vendor/marked.min.js" defer></script>
  <script src="js/vendor/purify.min.js" defer></script>
  <script src="js/vendor/highlight.min.js" defer></script>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app" class="app">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar__divider" id="sidebarDivider" title="Drag to resize sidebar"></div>
      <div class="sidebar__top">
        <div class="brand">
          <span class="brand__mark" aria-hidden="true">✶</span>
          <span class="brand__name">ChatBot</span>
        </div>
        <button id="collapseBtn" class="icon-btn" title="Collapse sidebar" aria-label="Collapse sidebar">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M14 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <button id="newChatBtn" class="new-chat">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>New chat</span>
      </button>

      <div class="search">
        <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="searchInput" type="text" placeholder="Search chats" autocomplete="off" />
      </div>

      <nav id="convoList" class="convo-list" aria-label="Conversations"></nav>

      <div class="sidebar__bottom">
        <button id="themeBtn" class="ghost-btn" title="Toggle theme">
          <svg id="themeIcon" viewBox="0 0 24 24" width="18" height="18"></svg>
          <span id="themeLabel">Light mode</span>
        </button>
        <button id="clearAllBtn" class="ghost-btn ghost-btn--danger" title="Delete all chats">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Clear all</span>
        </button>
      </div>
    </aside>

    <div id="scrim" class="scrim"></div>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <button id="menuBtn" class="icon-btn topbar__menu" aria-label="Open sidebar">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>

        <div class="model-select" id="modelSelect">
          <button id="modelBtn" class="model-select__btn" aria-haspopup="listbox" aria-expanded="false">
            <span class="model-select__dot"></span>
            <span id="modelBtnLabel">Model</span>
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div id="modelMenu" class="model-select__menu" role="listbox"></div>
        </div>

        <span id="demoBadge" class="demo-badge" hidden>Demo mode</span>
        <div class="topbar__spacer"></div>
      </header>

      <section id="thread" class="thread">
        <!-- Empty state -->
        <div id="welcome" class="welcome">
          <div class="welcome__mark">✶</div>
          <h1 class="welcome__title">How can I help, today?</h1>
          <p class="welcome__sub">Ask anything, or attach a document and ask about it. I stream answers in real time and remember the conversation.</p>
          <div class="suggestions" id="suggestions">
            <button class="chip" data-prompt="Explain how neural networks learn, with an analogy.">Explain neural networks simply</button>
            <button class="chip" data-prompt="Write a Python function to debounce another function.">Write a debounce function in Python</button>
            <button class="chip" data-prompt="Give me 5 dinner ideas using chicken, spinach and rice.">Plan a dinner from 3 ingredients</button>
            <button class="chip" data-prompt="Draft a polite email asking my manager for a one-week deadline extension.">Draft a deadline-extension email</button>
          </div>
        </div>

        <div id="messages" class="messages" aria-live="polite"></div>
      </section>

      <button id="scrollBtn" class="scroll-btn" hidden aria-label="Scroll to latest">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 5v14M5 12l7 7 7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <footer class="composer">
        <div id="attachments" class="attachments" hidden></div>
        <div class="composer__inner">
          <input id="fileInput" type="file" multiple hidden
                 accept=".pdf,.docx,.txt,.md,.markdown,.csv,.tsv,.json,.yaml,.yml,.xml,.html,.htm,.log,.py,.js,.ts,.jsx,.tsx,.java,.c,.h,.cpp,.cs,.go,.rs,.rb,.php,.swift,.kt,.sh,.sql,.png,.jpg,.jpeg,.webp,.gif,.bmp,image/*" />
          <button id="attachBtn" class="attach-btn" aria-label="Attach a file" title="Attach a document or image">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M21 11.5l-8.5 8.5a5 5 0 0 1-7-7l8.5-8.5a3.3 3.3 0 0 1 4.7 4.7L9 18.5a1.6 1.6 0 0 1-2.3-2.3l7.8-7.8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <textarea id="input" class="composer__input" rows="1" placeholder="Message ChatBot…" autocomplete="off"></textarea>
          <button id="sendBtn" class="send-btn" aria-label="Send message">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button id="stopBtn" class="stop-btn" aria-label="Stop generating" hidden>
            <svg viewBox="0 0 24 24" width="18" height="18"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
          </button>
        </div>
        <p class="composer__hint">ChatBot can make mistakes. Press <kbd>Enter</kbd> to send, <kbd>Shift</kbd>+<kbd>Enter</kbd> for a new line.</p>
      </footer>
    </main>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="js/app.js" defer></script>
</body>
</html>
